version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: viandas-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: viandas_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - viandas-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: viandas-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - viandas-network
    depends_on:
      - postgres

volumes:
  postgres_data:
  pgadmin_data:

networks:
  viandas-network:
    driver: bridge